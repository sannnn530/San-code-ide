<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forge Mobile IDE</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0d1117',
                        panelBg: '#161b22',
                        borderCol: '#21262d',
                        accentBlue: '#58a6ff',
                        accentPurple: '#bc8cff'
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbars for slick mobile look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Prevent elastic bouncing on iOS */
        body, html { overflow: hidden; position: fixed; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-darkBg text-[#c9d1d9] font-sans antialiased select-none">

    <div id="app" class="w-full h-full flex flex-col justify-between">
        <!-- Main structural content injected by app.js -->
    </div>

    <!-- Load external data & main engine scripts -->
    <script src="files.js"></script>
    <script src="app.js"></script>
</body>
</html>
